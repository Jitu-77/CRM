spring:
  application:
    name: Employees
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/EmployeeDB}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:Password@123}    
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect